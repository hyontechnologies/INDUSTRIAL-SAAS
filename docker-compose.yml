# ═══════════════════════════════════════════════════════════════════
# Piccadily Industrial Historian — Docker Compose (Development)
# Optimized for single 4GB Azure VM — total memory capped at ~3.2GB
# ═══════════════════════════════════════════════════════════════════

services:

  # ── TimescaleDB (PostgreSQL 15 + TimescaleDB) ───────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: piccadily-tsdb
    restart: unless-stopped
    environment:
      POSTGRES_USER:     historian_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-historian_dev_password}
      POSTGRES_DB:       historian
    ports:
      - "5432:5432"
    volumes:
      - tsdb_data:/var/lib/postgresql/data
      - ./timescaledb/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=512MB
        -c work_mem=8MB
        -c maintenance_work_mem=128MB
        -c max_connections=50
        -c timescaledb.max_background_workers=4
        -c log_min_duration_statement=500
    deploy:
      resources:
        limits:
          memory: 1536M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U historian_user -d historian"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - industrial_net

  # ── FastAPI Backend ─────────────────────────────────────────────
  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: piccadily-backend
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      DATABASE_URL:        "postgresql://historian_user:${DB_PASSWORD:-historian_dev_password}@timescaledb:5432/historian"
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      SUPABASE_URL:        ${SUPABASE_URL}
      JWT_AUDIENCE:        authenticated
      EDGE_API_KEYS:       ${EDGE_API_KEYS:-}
      CORS_ORIGINS:        "http://localhost:3000,http://localhost:5173,http://localhost"
      DEBUG:               "true"
      ENVIRONMENT:         development
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ping')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - industrial_net

  # ── Grafana ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana-oss:latest
    container_name: piccadily-grafana
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-grafana_dev}
      GF_SERVER_ROOT_URL:         "http://localhost:3001/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED:  "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - industrial_net

  # ── Redis (session cache + optional pub/sub) ────────────────────
  redis:
    image: redis:7-alpine
    container_name: piccadily-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - industrial_net

  # ── Nginx Reverse Proxy ────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: piccadily-nginx
    restart: unless-stopped
    depends_on:
      - fastapi
      - grafana
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - industrial_net

volumes:
  tsdb_data:
    driver: local
  grafana_data:
    driver: local

networks:
  industrial_net:
    driver: bridge
