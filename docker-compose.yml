# ═══════════════════════════════════════════════════════════════════
# Piccadily Industrial Historian — Docker Compose (Development)
# Optimized for single 4GB Azure VM — total memory capped at ~3.2GB
# ═══════════════════════════════════════════════════════════════════

services:

  # ── TimescaleDB (PostgreSQL 15 + TimescaleDB) ───────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: piccadily-tsdb
    restart: unless-stopped
    environment:
      POSTGRES_USER:     historian_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-historian_dev_password}
      POSTGRES_DB:       historian
    ports:
      - "5432:5432"
    volumes:
      - tsdb_data:/var/lib/postgresql/data
      - ./timescaledb/V1__init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=512MB
        -c work_mem=8MB
        -c maintenance_work_mem=128MB
        -c max_connections=50
        -c timescaledb.max_background_workers=4
        -c log_min_duration_statement=500
    deploy:
      resources:
        limits:
          memory: 1536M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U historian_user -d historian"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - industrial_net

  # ── FastAPI Backend ─────────────────────────────────────────────
  fastapi:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: piccadily-backend
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL:        "postgresql://historian_user:${DB_PASSWORD:-historian_dev_password}@timescaledb:5432/historian"
      REDIS_URL:           "redis://redis:6379/0"
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      SUPABASE_URL:        ${SUPABASE_URL}
      JWT_AUDIENCE:        authenticated
      EDGE_API_KEYS:       ${EDGE_API_KEYS:-}
      CORS_ORIGINS:        "http://localhost:3000,http://localhost:5173,http://localhost"
      DEBUG:               "true"
      ENVIRONMENT:         development
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ping')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - industrial_net

  # ── Grafana ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana-oss:latest
    container_name: piccadily-grafana
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-grafana_dev}
      GF_SERVER_ROOT_URL:         "http://localhost:3001/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED:  "false"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - industrial_net

  # ── Redis (realtime nervous system) ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: piccadily-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly yes
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - industrial_net

  # ── RedisInsight (developer GUI) ────────────────────────────────────────────────
  redisinsight:
    image: redis/redisinsight:latest
    container_name: piccadily-redisinsight
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    networks:
      - industrial_net

  # ── Redis Exporter (Prometheus metrics) ────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: piccadily-redis-exporter
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - industrial_net

  # ── Frontend (React/Vite SPA) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend-Final
      dockerfile: Dockerfile
    container_name: piccadily-frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    ports:
      - "80:80"
    networks:
      - industrial_net



volumes:
  tsdb_data:
    driver: local
  grafana_data:
    driver: local
  redis_data:
    driver: local
  redisinsight_data:
    driver: local

networks:
  industrial_net:
    driver: bridge
