version: "3.8"

services:
  simulator:
    build:
      context: ./edge-agent
      dockerfile: Dockerfile.edge
    command: ["python", "simulator.py"]
    ports:
      - "4840:4840"
    restart: unless-stopped
    networks:
      - industrial_net

  edge-agent:
    build:
      context: ./edge-agent
      dockerfile: Dockerfile.edge
    command: ["python", "edge_agent.py"]
    environment:
      - OPC_URL=opc.tcp://simulator:4840/piccadily/
      - VITE_API_URL=http://piccadily-backend:8000/api/v1
      - EDGE_API_KEY_RAW=${EDGE_API_KEY_RAW:-changeme}
      - TENANT_ID=piccadily
      - PLANT_ID=PICCADILY_PLANT_01
      - DEVICE_ID=BOILER_PLC_01
      - FLUSH_INTERVAL=2.0
      - LOG_LEVEL=INFO
    volumes:
      - edge_data:/app/data
    restart: unless-stopped
    depends_on:
      - simulator
    networks:
      - industrial_net

networks:
  industrial_net:
    external: true
    name: industrial-telemetry-platform-init_industrial_net

volumes:
  edge_data:
