# Piccadily Industrial Historian — Grafana Dashboard Provisioning
apiVersion: 1

providers:
  - name: piccadily
    orgId: 1
    folder: Piccadily
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
